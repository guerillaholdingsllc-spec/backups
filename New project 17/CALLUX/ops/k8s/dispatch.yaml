apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dispatch
  template:
    metadata:
      labels:
        app: dispatch
    spec:
      containers:
        - name: dispatch
          image: ghcr.io/callux/dispatch:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: callux-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: dispatch
spec:
  selector:
    app: dispatch
  ports:
    - port: 80
      targetPort: 3000

