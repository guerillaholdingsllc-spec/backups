apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: callux-api
  annotations:
    kubernetes.io/ingress.class: alb
spec:
  rules:
    - host: api.calluxos.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dispatch
                port:
                  number: 80

