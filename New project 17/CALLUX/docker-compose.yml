services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: callux
      POSTGRES_PASSWORD: callux
      POSTGRES_DB: callux
    ports:
      - "5433:5432"
    volumes:
      - callux_pg:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6380:6379"
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: callux
      MINIO_ROOT_PASSWORD: calluxsecret
    ports:
      - "9000:9000"
      - "9001:9001"
volumes:
  callux_pg:

