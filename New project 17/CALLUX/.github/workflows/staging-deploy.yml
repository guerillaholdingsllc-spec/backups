name: callux-staging-deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/callux-github-deploy
          aws-region: us-west-1
      - run: echo "Build images, push to ECR/GHCR, apply Helm/K8s manifests"

